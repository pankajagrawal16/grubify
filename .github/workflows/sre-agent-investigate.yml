# Trigger SRE Agent investigation when a production issue is reported
name: SRE Agent - Investigate Issue

on:
  issues:
    types: [opened]

jobs:
  investigate:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      issues: read

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Call SRE Agent HTTP Trigger
        env:
          SRE_TRIGGER_URL: ${{ secrets.SRE_TRIGGER_URL }}
        run: |
          ARM_TOKEN=$(az account get-access-token --resource 59f0a04a-b322-4310-adc9-39ac41e9631e --query accessToken -o tsv)
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$SRE_TRIGGER_URL" \
            -H "Authorization: Bearer $ARM_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"source\": \"github\",
              \"issue_title\": \"${{ github.event.issue.title }}\",
              \"issue_number\": ${{ github.event.issue.number }},
              \"issue_url\": \"${{ github.event.issue.html_url }}\",
              \"repo\": \"${{ github.repository }}\"
            }")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "202" ] && [ "$HTTP_CODE" != "200" ]; then
            echo "::error::SRE Agent trigger failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "::notice::SRE Agent investigation triggered successfully"
